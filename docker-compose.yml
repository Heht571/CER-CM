services:
  postgres:
    image: postgres:15
    container_name: jifang-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root123
      POSTGRES_DB: jifang_jianshe
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d jifang_jianshe"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: